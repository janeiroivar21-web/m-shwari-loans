<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Withdraw from M-SHWARI</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f3f3f3;
}

.header{
    background:#49B72F;
    color:white;
    text-align:center;
    padding:20px;
    font-size:22px;
    font-weight:bold;
}

.container{
    max-width:500px;
    margin:20px auto;
    padding:15px;
}

.card{
    background:white;
    border-radius:15px;
    padding:20px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.card h2{
    color:#49B72F;
    margin-bottom:20px;
    text-align:center;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

input{
    width:100%;
    padding:15px;
    border:1px solid #ddd;
    border-radius:10px;
    margin-bottom:15px;
    font-size:16px;
}

.note{
    background:#f8f8f8;
    border-left:4px solid #49B72F;
    padding:12px;
    border-radius:8px;
    margin-bottom:20px;
    font-size:14px;
    color:#555;
}

button{
    width:100%;
    padding:15px;
    background:#49B72F;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

button:disabled{
    opacity:.7;
}

.status-box{
    margin-top:20px;
    display:none;
    text-align:center;
    padding:15px;
    border-radius:10px;
    background:#eef9ea;
    color:#2d7c1f;
    font-weight:bold;
}

.back-btn{
    display:inline-block;
    margin-bottom:15px;
    text-decoration:none;
    color:#49B72F;
    font-weight:bold;
}

.success-modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.6);
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.success-box{
    width:90%;
    max-width:350px;
    background:white;
    border-radius:20px;
    padding:30px;
    text-align:center;
}

.checkmark{
    width:80px;
    height:80px;
    background:#49B72F;
    color:white;
    font-size:50px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:auto;
    margin-bottom:20px;
}

.success-box h2{
    color:#49B72F;
    margin-bottom:10px;
}

.success-box p{
    margin-bottom:20px;
    color:#555;
}

.success-box button{
    padding:12px 25px;
}

</style>
</head>
<body>

<div class="header">
    Withdraw from M-SHWARI
</div>

<div class="container">

    <a href="dashboard.html" class="back-btn">
        ← Back to Dashboard
    </a>

    <div class="card">

        <h2>Withdraw Funds</h2>

        <label>M-PESA Phone Number</label>

        <input
            type="tel"
            id="phone"
            placeholder="07XXXXXXXX">

        <label>Amount (KSH)</label>

        <input
            type="number"
            id="amount"
            placeholder="Enter amount">

        <div class="note">
            Minimum Withdrawal: KSH 50
        </div>

        <button
            id="withdrawBtn"
            onclick="startWithdrawal()">
            Withdraw Now
        </button>

        <div
            class="status-box"
            id="statusBox">
        </div>

    </div>

</div>

<script>
function startWithdrawal(){

    const phone =
    document.getElementById("phone").value.trim();

    const amount =
    Number(document.getElementById("amount").value);

    if(!phone){
        alert("Enter phone number");
        return;
    }

    if(amount < 50){
        alert("Minimum withdrawal is KSH 50");
        return;
    }

    document.getElementById(
        "withdrawalModal"
    ).style.display = "flex";
}

function closeNotice(){
    document.getElementById(
        "withdrawalModal"
    ).style.display = "none";
}

function closeSuccessModal(){

    window.location.href =
    "dashboard.html";
}

</script>
<div id="withdrawalModal" class="success-modal">

    <div class="success-box">

        <div class="checkmark">!</div>

        <h2>Withdrawal Unavailable</h2>

        <p>
    Withdrawals are temporarily unavailable.

    <br><br>

    Our team is currently performing system upgrades
    to improve transaction security and reliability.

    <br><br>

    Please try again later.
</p>

        <button onclick="closeNotice()">
            OK
        </button>

    </div>

</div>
</body>
</html>
