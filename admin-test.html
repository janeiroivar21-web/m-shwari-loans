<!DOCTYPE html>
<html>
<body>
<h2>Admin Test</h2>
<p id="result">Testing...</p>

<script type="module">
import { db } from "./firebase.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

try {
    const snap = await getDoc(doc(db, "admins", "ENOCKBOSS"));

    document.getElementById("result").innerHTML =
        snap.exists()
            ? "✅ Admin Found"
            : "❌ Admin Not Found";
} catch (e) {
    document.getElementById("result").innerHTML =
        e.code + "<br>" + e.message;
}
</script>

</body>
</html>
