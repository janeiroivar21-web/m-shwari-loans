<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Withdraw from M-SHWARI</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f3f3f3;
}

.header{
    background:#49B72F;
    color:white;
    text-align:center;
    padding:20px;
    font-size:22px;
    font-weight:bold;
}

.container{
    max-width:500px;
    margin:20px auto;
    padding:15px;
}

.card{
    background:white;
    border-radius:15px;
    padding:20px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

h2{
    color:#49B72F;
    text-align:center;
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

input{
    width:100%;
    padding:15px;
    margin-bottom:15px;
    border:1px solid #ddd;
    border-radius:10px;
}

.note{
    background:#f8f8f8;
    border-left:4px solid #49B72F;
    padding:12px;
    border-radius:8px;
    margin-bottom:15px;
    font-size:14px;
    color:#555;
}

button{
    width:100%;
    padding:15px;
    background:#49B72F;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

button:disabled{
    opacity:0.6;
}

.loader{
    display:none;
    text-align:center;
    margin-top:10px;
}

.loader span{
    display:inline-block;
    width:10px;
    height:10px;
    background:#49B72F;
    border-radius:50%;
    margin:0 3px;
    animation:bounce 1.2s infinite;
}

.loader span:nth-child(2){animation-delay:.2s;}
.loader span:nth-child(3){animation-delay:.4s;}

@keyframes bounce{
    0%,80%,100%{transform:scale(0);}
    40%{transform:scale(1);}
}

/* MODALS */
.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.6);
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.box{
    width:90%;
    max-width:350px;
    background:white;
    border-radius:15px;
    padding:25px;
    text-align:center;
}

.icon{
    width:70px;
    height:70px;
    margin:auto;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:35px;
    color:white;
    margin-bottom:15px;
    background:#49B72F;
}

.icon.red{
    background:#e74c3c;
}

.btn-row{
    display:flex;
    gap:10px;
    margin-top:15px;
}

.btn-row button{
    flex:1;
}

.cancel{
    background:#999;
}
</style>
</head>
<body>

<div class="header">Withdraw from M-SHWARI</div>

<div class="container">

<a href="dashboard.html" style="color:#49B72F;font-weight:bold;text-decoration:none;">← Back</a>

<div class="card">

<h2>Withdraw Funds</h2>

<label>Phone Number</label>
<input type="tel" id="phone" placeholder="07XXXXXXXX">

<label>Amount (KSH)</label>
<input type="number" id="amount" placeholder="Enter amount">

<div class="note">
Minimum Withdrawal: KSH 50<br>
Maximum Withdrawal: KSH 500,000<br>
</div>

<button id="withdrawBtn" onclick="openConfirm()">
Withdraw Now
</button>

<div class="loader" id="loader">
<span></span><span></span><span></span>
</div>

</div>
</div>

<!-- CONFIRM MODAL -->
<div class="modal" id="confirmModal">
<div class="box">
<div class="icon">?</div>

<h3>Confirm Withdrawal</h3>

<p id="confirmText"></p>

<div class="btn-row">
<button class="cancel" onclick="closeConfirm()">Cancel</button>
<button onclick="startWithdrawal()">Confirm</button>
</div>

</div>
</div>

<!-- SUCCESS MODAL -->
<div class="modal" id="successModal">
<div class="box">
<div class="icon">✓</div>
<h3>Withdrawal Sent</h3>
<p id="successText"></p>
<button onclick="location.href='dashboard.html'">OK</button>
</div>
</div>

<!-- FAIL MODAL -->
<div class="modal" id="failModal">
<div class="box">
<div class="icon red">✕</div>
<h3>Failed</h3>
<p id="failText"></p>
<button onclick="closeFail()">Try Again</button>
</div>
</div>

<script>

const SERVER = "https://withdrawal-optima.onrender.com";

let locked = false;

/* OPEN CONFIRMATION */
function openConfirm(){

    const phone = document.getElementById("phone").value.trim();
    const amount = Number(document.getElementById("amount").value);

    if(!phone){
        showFail("Enter phone number");
        return;
    }

    if(amount < 50){
        showFail("Minimum withdrawal is KSH 50");
        return;
    }

    if(amount > 500){
        showFail("Withdrawals above KSH 500 are temporarily unavailable right now");
        return;
    }

    if(amount > 500000){
        showFail("Maximum withdrawal is KSH 500,000");
        return;
    }

    document.getElementById("confirmText").innerText =
        `Send KSH ${amount} to ${phone}?`;

    document.getElementById("confirmModal").style.display = "flex";
}

/* CLOSE CONFIRM */
function closeConfirm(){
    document.getElementById("confirmModal").style.display = "none";
}

/* MAIN WITHDRAW */
async function startWithdrawal(){

    if(locked) return;
    locked = true;

    closeConfirm();

    const phone = document.getElementById("phone").value.trim();
    const amount = Number(document.getElementById("amount").value);

    const btn = document.getElementById("withdrawBtn");
    const loader = document.getElementById("loader");

    btn.disabled = true;
    loader.style.display = "block";

    try{

        const res = await fetch(SERVER + "/withdraw", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({ phone, amount })
        });

        const data = await res.json();

        if(!data.success){
            throw new Error(data.message || "Withdrawal failed");
        }

        document.getElementById("successText").innerText =
            `KSH ${amount} sent successfully.`;

        document.getElementById("successModal").style.display = "flex";

    }catch(err){

        showFail(err.message);

    }finally{

        locked = false;
        btn.disabled = false;
        loader.style.display = "none";
    }
}

/* FAIL */
function showFail(msg){
    document.getElementById("failText").innerText = msg;
    document.getElementById("failModal").style.display = "flex";
}

function closeFail(){
    document.getElementById("failModal").style.display = "none";
}

</script>

</body>
</html>
