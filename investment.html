<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>M-SHWARI Investment</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f3f3f3;
}

.header{
background:#49B72F;
color:white;
padding:20px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.balance-card{
background:white;
margin:15px;
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.balance{
font-size:32px;
font-weight:bold;
color:#49B72F;
margin-top:10px;
}

.plan{
background:white;
margin:15px;
padding:20px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.plan h3{
color:#49B72F;
margin-bottom:10px;
}

.plan p{
margin:8px 0;
color:#555;
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ddd;
border-radius:10px;
font-size:15px;
}

.btn{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:10px;
background:#49B72F;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.btn:hover{
opacity:.9;
}

#toast{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#333;
color:white;
padding:12px 20px;
border-radius:10px;
opacity:0;
transition:.3s;
z-index:9999;
}

#toast.show{
opacity:1;
}
</style>
</head>
<body>

<div class="header">
📈 Investment Plans
</div>

<div class="balance-card">
<h3>Available Balance</h3>
<div class="balance" id="walletBalance">
KES 0.00
</div>
</div>

<!-- STARTER -->
<div class="plan">
<h3>Starter Plan</h3>
<p>Investment Range: KES 100 - 500</p>

<input type="number"
id="starterAmount"
placeholder="Enter amount">

<select id="starterDuration">
<option value="43200000|0.05">12 Hours (5%)</option>
<option value="86400000|0.10">24 Hours (10%)</option>
<option value="604800000|0.20">1 Week (20%)</option>
<option value="2592000000|0.50">1 Month (50%)</option>
</select>

<button class="btn"
onclick="startInvestment('starterAmount','starterDuration',100,500)">
Invest Now
</button>
</div>

<!-- SILVER -->
<div class="plan">
<h3>Silver Plan</h3>
<p>Investment Range: KES 500 - 1,000</p>

<input type="number"
id="silverAmount"
placeholder="Enter amount">

<select id="silverDuration">
<option value="43200000|0.05">12 Hours (5%)</option>
<option value="86400000|0.10">24 Hours (10%)</option>
<option value="604800000|0.20">1 Week (20%)</option>
<option value="2592000000|0.50">1 Month (50%)</option>
</select>

<button class="btn"
onclick="startInvestment('silverAmount','silverDuration',500,1000)">
Invest Now
</button>
</div>

<!-- GOLD -->
<div class="plan">
<h3>Gold Plan</h3>
<p>Investment Range: KES 1,000 - 10,000</p>

<input type="number"
id="goldAmount"
placeholder="Enter amount">

<select id="goldDuration">
<option value="43200000|0.05">12 Hours (5%)</option>
<option value="86400000|0.10">24 Hours (10%)</option>
<option value="604800000|0.20">1 Week (20%)</option>
<option value="2592000000|0.50">1 Month (50%)</option>
</select>

<button class="btn"
onclick="startInvestment('goldAmount','goldDuration',1000,10000)">
Invest Now
</button>
</div>

<!-- PREMIUM -->
<div class="plan">
<h3>Premium Plan</h3>
<p>Investment Range: KES 10,000+</p>

<input type="number"
id="premiumAmount"
placeholder="Enter amount">

<select id="premiumDuration">
<option value="43200000|0.05">12 Hours (5%)</option>
<option value="86400000|0.10">24 Hours (10%)</option>
<option value="604800000|0.20">1 Week (20%)</option>
<option value="2592000000|0.50">1 Month (50%)</option>
</select>

<button class="btn"
onclick="startInvestment('premiumAmount','premiumDuration',10000,null)">
Invest Now
</button>
</div>

<div id="toast"></div>

<script type="module">

import { auth, db } from "./firebase.js";

import {
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

import {
doc,
getDoc,
updateDoc
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

let currentUser=null;

const cachedUser = JSON.parse(localStorage.getItem("mshwariUser"));

if (cachedUser) {

    document.getElementById("walletBalance").innerHTML =
    "KES " +
    (cachedUser.wallet || 0).toLocaleString(undefined,{
        minimumFractionDigits:2,
        maximumFractionDigits:2
    });

}

function showToast(message){

const toast=document.getElementById("toast");

toast.textContent=message;
toast.classList.add("show");

setTimeout(()=>{
toast.classList.remove("show");
},3000);

}

window.startInvestment = async function(

amountId,
durationId,
min,
max

){

const amount=
Number(document.getElementById(amountId).value);

if (!currentUser) {
    showToast("Please wait...");
    return;
}

if(!amount){

showToast("Enter investment amount");
return;

}

if(amount < min){

showToast(`Minimum investment is KES ${min}`);
return;

}

if(max !== null && amount > max){

showToast(`Maximum investment is KES ${max}`);
return;

}

const selected =
document.getElementById(durationId).value;

const parts =
selected.split("|");

const duration =
Number(parts[0]);

const rate =
Number(parts[1]);

const userRef =
doc(db,"users",currentUser.uid);

const snap =
await getDoc(userRef);

if(!snap.exists()){

showToast("User not found");
return;

}

const data=snap.data();

if (
    data.status &&
    data.status.toLowerCase() === "suspended"
) {
    window.location.href = "blocked.html"; // or blocked.html if that's your actual page
    return;
}
  
const wallet=data.wallet || 0;

if(wallet < amount){

showToast("Insufficient balance");
return;

}

if(data.investment){

showToast("You already have an active investment");
return;

}

await updateDoc(userRef,{

wallet:wallet - amount,

investment:{
amount:amount,
rate:rate,
duration:duration,
startTime:Date.now(),
paid:false
}

});

// Update local cache immediately
const updatedUser = {
    ...data,
    wallet: wallet - amount,
    investment: {
        amount: amount,
        rate: rate,
        duration: duration,
        startTime: Date.now(),
        paid: false
    }
};

localStorage.setItem("mshwariUser", JSON.stringify({
    uid: currentUser.uid,
    ...updatedUser
}));

showToast("Investment successful");

setTimeout(()=>{

window.location.href="dashboard.html";

},1500);

};

onAuthStateChanged(auth,async(user)=>{

if(!user){

window.location.href="login.html";
return;

}

currentUser=user;

const userRef=
doc(db,"users",user.uid);

const snap=
await getDoc(userRef);

if(snap.exists()){

const data=snap.data();

if (
    data.status &&
    data.status.toLowerCase() === "suspended"
) {
    window.location.href = "blocked.html";
    return;
}
  
// Update cache
localStorage.setItem("mshwariUser", JSON.stringify({
    uid: user.uid,
    ...data
}));

// Refresh balance
document.getElementById("walletBalance").innerHTML =
"KES " +
(data.wallet || 0).toLocaleString(undefined,{
    minimumFractionDigits:2,
    maximumFractionDigits:2
});

}

});

</script>

</body>
  </html>
