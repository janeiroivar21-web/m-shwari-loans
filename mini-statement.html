<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Mini Statement</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f3f3f3;
padding:15px;
}

.header{
background:#49B72F;
color:white;
padding:18px;
text-align:center;
font-size:22px;
font-weight:bold;
border-radius:15px;
margin-bottom:15px;
}

.back-btn{
display:inline-block;
margin-bottom:15px;
text-decoration:none;
color:#49B72F;
font-weight:bold;
}

.card{
background:white;
padding:15px;
border-radius:15px;
margin-bottom:12px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.type{
font-size:17px;
font-weight:bold;
margin-bottom:8px;
}

.amount{
font-size:20px;
font-weight:bold;
color:#49B72F;
margin-bottom:8px;
}

.date{
font-size:13px;
color:#777;
margin-top:8px;
}

.status{
display:inline-block;
padding:5px 12px;
border-radius:20px;
font-size:13px;
font-weight:bold;
margin-top:5px;
}

.completed{
background:#e8f8ec;
color:#28a745;
}

.pending{
background:#fff4d9;
color:#ff9800;
}

.failed{
background:#ffe5e5;
color:#dc3545;
}

.approved{
background:#e8f8ec;
color:#28a745;
}

.empty{
background:white;
padding:30px;
border-radius:15px;
text-align:center;
color:#777;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

</style>
</head>
<body>

<div class="header">
📄 Mini Statement
</div>

<a href="dashboard.html" class="back-btn">
← Back to Dashboard
</a>

<div id="list"></div>

<script type="module">

import { auth, db } from "./firebase.js";

import {
doc,
getDoc
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const list =
document.getElementById("list");

const cachedUser = JSON.parse(localStorage.getItem("mshwariUser"));

if (
    cachedUser &&
    cachedUser.status &&
    cachedUser.status.toLowerCase() === "suspended"
){
    location.href = "blocked.html";
}

auth.onAuthStateChanged(
async(user)=>{

if(!user){

window.location.href =
"login.html";

return;

}

try{

const userRef =
doc(db,"users",user.uid);

const snap =
await getDoc(userRef);

if(!snap.exists()){

list.innerHTML =
`
<div class="empty">
No transactions found.
</div>
`;

return;

}

const data =
snap.data();

localStorage.setItem(
    "mshwariUser",
    JSON.stringify({
        ...(cachedUser || {}),
        uid: user.uid,
        ...data
    })
);

const transactions =
data.transactions || [];

if(transactions.length === 0){

list.innerHTML =
`
<div class="empty">
No transactions yet.
</div>
`;

return;

}
  
list.innerHTML = "";

[...transactions].reverse().forEach(t=>{

let statusClass =
"completed";

if(
t.status === "Pending"
){
statusClass = "pending";
}

if(
t.status === "Failed"
){
statusClass = "failed";
}

if(
t.status === "Approved"
){
statusClass = "approved";
}

list.innerHTML +=
`
<div class="card">

<div class="type">
${t.type}
</div>

<div class="amount">
KES ${Number(
t.amount || 0
).toLocaleString()}
</div>

<div class="status ${statusClass}">
${t.status || "Completed"}
</div>

<div class="date">
${t.date || ""}
</div>

</div>
`;

});

}catch(error){

console.error(error);

list.innerHTML =
`
<div class="empty">
Failed to load transactions.
</div>
`;

}

});

</script>

</body>
</html>
