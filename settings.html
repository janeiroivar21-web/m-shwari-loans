<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>M-SHWARI Settings</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#f3f3f3}
.header{background:#49B72F;color:#fff;padding:18px;text-align:center;font-size:22px;font-weight:bold}
.card{background:#fff;margin:15px;padding:18px;border-radius:16px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
.card h3{color:#49B72F;margin-bottom:12px}
input,select{width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:10px}
label{display:block;margin:10px 0}
.btn{width:100%;padding:14px;border:none;border-radius:12px;margin-top:10px;font-weight:bold;cursor:pointer}
.save{background:#49B72F;color:white}
.warn{background:#ff9800;color:white}
.danger{background:#dc3545;color:white}
.logout{background:#333;color:white}
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:12px 18px;border-radius:10px;display:none}
</style>
</head>
<body>
<div class="header">⚙️ Settings</div>

<div class="card">
<h3>👤 Edit Profile</h3>
<input id="fullName" placeholder="Full Name">
<input id="username" placeholder="Username">
<button class="btn save" id="saveProfile">Save Profile</button>
</div>

<div class="card">
<h3>📱 Change Phone Number</h3>
<input id="phone" placeholder="07XXXXXXXX">
<button class="btn save" id="savePhone">Update Phone</button>
</div>

<div class="card">
<h3>🔔 Notification Settings</h3>
<label><input type="checkbox" id="loanNotify"> Loan Notifications</label>
<label><input type="checkbox" id="investNotify"> Investment Notifications</label>
<label><input type="checkbox" id="promoNotify"> Promotional Messages</label>
<button class="btn save" id="saveNotifications">Save Notifications</button>
</div>

<div class="card">
<h3>🎨 App Settings</h3>
<select id="theme">
<option value="light">🌞 Light Mode</option>
<option value="dark">🌙 Dark Mode</option>
</select>

<select id="language">
<option value="en">🇬🇧 English</option>
<option value="sw">🇰🇪 Swahili</option>
</select>
<button class="btn save" id="saveApp">Save Settings</button>
</div>

<div class="card">
<h3>🚫 Account Controls</h3>
<button class="btn warn" id="deactivateBtn">Deactivate Account</button>
<button class="btn danger" id="deleteBtn">Delete Account Permanently</button>
</div>

<div class="card">
<button class="btn logout" id="logoutBtn">🚪 Logout</button>
</div>

<div id="toast"></div>

<script type="module">
import { auth, db } from "./firebase.js";
import {
onAuthStateChanged,
signOut,
deleteUser
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

import {
doc,
getDoc,
updateDoc,
deleteDoc
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

let userRef=null;

function toast(msg){
 const t=document.getElementById("toast");
 t.innerText=msg;
 t.style.display="block";
 setTimeout(()=>t.style.display="none",3000);
}

onAuthStateChanged(auth, async(user)=>{
 if(!user){
   location.href="login.html";
   return;
 }

 userRef=doc(db,"users",user.uid);
 const snap=await getDoc(userRef);

 if(!snap.exists()) return;

 const data=snap.data();

 fullName.value=data.fullName||"";
 username.value=data.username||"";
 phone.value=data.phone||"";

 if(data.notifications){
   loanNotify.checked=!!data.notifications.loans;
   investNotify.checked=!!data.notifications.investments;
   promoNotify.checked=!!data.notifications.promotions;
 }

 theme.value=data.theme||"light";
 language.value=data.language||"en";
});

saveProfile.onclick=async()=>{
 await updateDoc(userRef,{
   fullName:fullName.value,
   displayName:fullName.value,
   username:username.value
 });
 toast("Profile updated");
};

savePhone.onclick=async()=>{
 await updateDoc(userRef,{phone:phone.value});
 toast("Phone updated");
};

saveNotifications.onclick=async()=>{
 await updateDoc(userRef,{
 notifications:{
  loans:loanNotify.checked,
  investments:investNotify.checked,
  promotions:promoNotify.checked
 }});
 toast("Notifications saved");
};

saveApp.onclick=async()=>{
 await updateDoc(userRef,{
   theme:theme.value,
   language:language.value
 });
 toast("Settings saved");
};

deactivateBtn.onclick=async()=>{
 if(!confirm("Deactivate account?")) return;
 await updateDoc(userRef,{status:"deactivated"});
 toast("Account deactivated");
};

deleteBtn.onclick=async()=>{
 const txt=prompt("Type DELETE to continue");
 if(txt!=="DELETE") return;

 try{
   await deleteDoc(userRef);
   await deleteUser(auth.currentUser);
   location.href="login.html";
 }catch(e){
   alert("Firebase may require recent login before deletion: "+e.message);
 }
};

logoutBtn.onclick=async()=>{
 await signOut(auth);
 location.href="login.html";
};
</script>
</body>
</html>
